<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#07030f"/>
    </radialGradient>

    <!-- Gold ambient glow (left, around logo) -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple accent glow (right side) -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7733cc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7733cc" stop-opacity="0"/>
    </radialGradient>

    <!-- Naaru core -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe599"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe599"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8a030"/>
    </linearGradient>

    <!-- Divider gradient -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffe066" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ffe066" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </linearGradient>

    <filter id="blur-sm"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="blur-xl"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle star field -->
  <g fill="#ffffff">
    <circle cx="80" cy="55" r="0.8" opacity="0.4"/>
    <circle cx="210" cy="120" r="0.6" opacity="0.3"/>
    <circle cx="440" cy="30" r="1" opacity="0.5"/>
    <circle cx="560" cy="90" r="0.7" opacity="0.3"/>
    <circle cx="700" cy="45" r="0.9" opacity="0.4"/>
    <circle cx="820" cy="110" r="0.6" opacity="0.35"/>
    <circle cx="950" cy="25" r="1.1" opacity="0.5"/>
    <circle cx="1100" cy="70" r="0.7" opacity="0.3"/>
    <circle cx="1210" cy="130" r="0.8" opacity="0.4"/>
    <circle cx="60" cy="580" r="0.9" opacity="0.35"/>
    <circle cx="190" cy="520" r="0.6" opacity="0.3"/>
    <circle cx="380" cy="610" r="0.8" opacity="0.4"/>
    <circle cx="530" cy="550" r="0.7" opacity="0.3"/>
    <circle cx="750" cy="600" r="1" opacity="0.45"/>
    <circle cx="900" cy="530" r="0.6" opacity="0.3"/>
    <circle cx="1050" cy="590" r="0.9" opacity="0.4"/>
    <circle cx="1180" cy="540" r="0.7" opacity="0.35"/>
    <circle cx="120" cy="310" r="0.5" opacity="0.2"/>
    <circle cx="1160" cy="290" r="0.5" opacity="0.2"/>
  </g>

  <!-- Ambient glow behind logo -->
  <ellipse cx="320" cy="320" rx="280" ry="260" fill="url(#goldGlow)" filter="url(#blur-xl)"/>

  <!-- Ambient glow right side -->
  <ellipse cx="960" cy="320" rx="340" ry="280" fill="url(#purpleGlow)" filter="url(#blur-xl)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT LOGO (centered at ~320, 320) -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="translate(320, 320)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#c8860a" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="0" cy="0" r="208" fill="none" stroke="#ffe066" stroke-width="0.5" stroke-opacity="0.5"/>

    <!-- Tick marks -->
    <g stroke="#ffe066" stroke-width="2" stroke-opacity="0.6">
      <line x1="0" y1="-210" x2="0" y2="-192"/>
      <line x1="0" y1="192" x2="0" y2="210"/>
      <line x1="-210" y1="0" x2="-192" y2="0"/>
      <line x1="192" y1="0" x2="210" y2="0"/>
      <line x1="-148" y1="-148" x2="-136" y2="-136" stroke-opacity="0.35"/>
      <line x1="136" y1="136" x2="148" y2="148" stroke-opacity="0.35"/>
      <line x1="136" y1="-136" x2="148" y2="-148" stroke-opacity="0.35"/>
      <line x1="-148" y1="136" x2="-136" y2="148" stroke-opacity="0.35"/>
    </g>

    <!-- Targeting reticle arms -->
    <g stroke="#ffe066" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-gold)">
      <line x1="0" y1="-192" x2="0" y2="-115" stroke-opacity="0.9"/>
      <line x1="0" y1="115" x2="0" y2="192" stroke-opacity="0.9"/>
      <line x1="-192" y1="0" x2="-115" y2="0" stroke-opacity="0.9"/>
      <line x1="115" y1="0" x2="192" y2="0" stroke-opacity="0.9"/>
    </g>

    <!-- Middle ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#ffe066" stroke-width="1" stroke-opacity="0.2"/>

    <!-- Arcane rune dashes -->
    <circle cx="0" cy="0" r="168" fill="none"
            stroke="#8855cc" stroke-width="1" stroke-opacity="0.3"
            stroke-dasharray="5 18"
            transform="rotate(22.5)"/>

    <!-- Naaru octagram -->
    <polygon points="0,-95 22,-22 95,0 22,22 0,95 -22,22 -95,0 -22,-22"
             fill="none" stroke="#ffe599" stroke-width="1.5" stroke-opacity="0.55" filter="url(#glow-gold)"/>
    <polygon points="0,-95 22,-22 95,0 22,22 0,95 -22,22 -95,0 -22,-22"
             fill="#ffe066" fill-opacity="0.04"/>

    <!-- Rotated square -->
    <polygon points="67,-67 67,67 -67,67 -67,-67"
             fill="none" stroke="#c8860a" stroke-width="1" stroke-opacity="0.3"
             transform="rotate(45)"/>

    <!-- Inner diamond -->
    <polygon points="0,-50 50,0 0,50 -50,0"
             fill="none" stroke="#ffe066" stroke-width="1.5" stroke-opacity="0.55" filter="url(#glow-gold)"/>

    <!-- Corner brackets -->
    <g stroke="#ffe066" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#glow-gold)">
      <path d="M-80,-45 L-80,-65 L-60,-65" stroke-opacity="0.85"/>
      <path d="M80,-45 L80,-65 L60,-65" stroke-opacity="0.85"/>
      <path d="M-80,45 L-80,65 L-60,65" stroke-opacity="0.85"/>
      <path d="M80,45 L80,65 L60,65" stroke-opacity="0.85"/>
    </g>

    <!-- Naaru core glow -->
    <circle cx="0" cy="0" r="36" fill="url(#coreGrad)" filter="url(#blur-sm)"/>
    <circle cx="0" cy="0" r="18" fill="#fff8e0" filter="url(#blur-sm)"/>
    <circle cx="0" cy="0" r="9" fill="#ffffff"/>

    <!-- Skull raid marker -->
    <g transform="translate(148, -148)">
      <circle cx="0" cy="0" r="28" fill="#ff2200" fill-opacity="0.2" filter="url(#blur-md)"/>
      <circle cx="0" cy="0" r="22" fill="#1a0000" stroke="#ff4422" stroke-width="2"/>
      <ellipse cx="0" cy="-2" rx="11" ry="10" fill="#ff5533"/>
      <rect x="-11" y="5" width="22" height="7" rx="2" fill="#ff5533"/>
      <ellipse cx="-4" cy="-4" rx="3" ry="3" fill="#1a0000"/>
      <ellipse cx="4" cy="-4" rx="3" ry="3" fill="#1a0000"/>
      <rect x="-7.5" y="6.5" width="4" height="5" rx="0.5" fill="#1a0000"/>
      <rect x="-2" y="6.5" width="4" height="5" rx="0.5" fill="#1a0000"/>
      <rect x="3.5" y="6.5" width="4" height="5" rx="0.5" fill="#1a0000"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- VERTICAL DIVIDER -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="620" y1="80" x2="620" y2="560" stroke="url(#dividerGrad)" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT TEXT CONTENT -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- WoW addon tag -->
  <text x="660" y="178"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" letter-spacing="5"
        fill="#8855cc" fill-opacity="0.9">WORLD OF WARCRAFT ADDON</text>

  <!-- Main title: DIVINE GUILE -->
  <text x="655" y="272"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="82" font-weight="bold" letter-spacing="2"
        fill="url(#titleGrad)" filter="url(#glow-text)">DIVINE GUILE</text>

  <!-- Main title: MARKER -->
  <text x="657" y="358"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="82" font-weight="bold" letter-spacing="8"
        fill="url(#titleGrad)" filter="url(#glow-text)">MARKER</text>

  <!-- Gold accent line under title -->
  <rect x="657" y="375" width="540" height="1.5" fill="#ffe066" fill-opacity="0.5"/>

  <!-- Description -->
  <text x="657" y="418"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19" fill="#d4c090" fill-opacity="0.85" letter-spacing="0.5">
    Automatically identifies and skull-marks the real
  </text>
  <text x="657" y="446"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19" fill="#d4c090" fill-opacity="0.85" letter-spacing="0.5">
    Lothraxion during <tspan fill="#ffe066">Divine Guile</tspan> in Nexus-Point Xenas.
  </text>

  <!-- Feature pills -->
  <g transform="translate(657, 488)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="148" height="30" rx="15" fill="#ffe066" fill-opacity="0.1" stroke="#ffe066" stroke-width="1" stroke-opacity="0.4"/>
    <text x="74" y="20" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="12" letter-spacing="1.5" fill="#ffe599">GUID TRACKING</text>

    <!-- Pill 2 -->
    <rect x="162" y="0" width="148" height="30" rx="15" fill="#ffe066" fill-opacity="0.1" stroke="#ffe066" stroke-width="1" stroke-opacity="0.4"/>
    <text x="236" y="20" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="12" letter-spacing="1.5" fill="#ffe599">CAST DETECTION</text>

    <!-- Pill 3 -->
    <rect x="324" y="0" width="148" height="30" rx="15" fill="#8855cc" fill-opacity="0.15" stroke="#8855cc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="398" y="20" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="12" letter-spacing="1.5" fill="#bb88ff">MYTHIC+ READY</text>
  </g>

  <!-- Bottom tag line -->
  <text x="657" y="564"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" letter-spacing="3" fill="#ffe066" fill-opacity="0.45">
    github.com/mlaplante/DivineGuileMarker
  </text>

  <!-- Vignette overlay -->
  <rect width="1280" height="640" fill="url(#vignette)"/>
</svg>
