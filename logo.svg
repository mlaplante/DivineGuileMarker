<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Deep dark background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#07030f"/>
    </radialGradient>

    <!-- Gold glow gradient -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner light for naaru core -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe599"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>

    <!-- Marker skull/eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="18"/>

  <!-- Ambient gold glow center -->
  <circle cx="200" cy="200" r="170" fill="url(#goldGlow)" filter="url(#blur-lg)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#c8860a" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="200" cy="200" r="158" fill="none" stroke="#ffe066" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#ffe066" stroke-width="2" stroke-opacity="0.7">
    <line x1="200" y1="38" x2="200" y2="56"/>
    <line x1="200" y1="344" x2="200" y2="362"/>
    <line x1="38" y1="200" x2="56" y2="200"/>
    <line x1="344" y1="200" x2="362" y2="200"/>
    <!-- Diagonal ticks -->
    <line x1="86" y1="86" x2="98" y2="98" stroke-opacity="0.4"/>
    <line x1="302" y1="302" x2="314" y2="314" stroke-opacity="0.4"/>
    <line x1="314" y1="86" x2="302" y2="98" stroke-opacity="0.4"/>
    <line x1="98" y1="302" x2="86" y2="314" stroke-opacity="0.4"/>
  </g>

  <!-- Targeting reticle arms -->
  <g stroke="#ffe066" stroke-width="2" stroke-linecap="round" filter="url(#glow-gold)">
    <!-- Top -->
    <line x1="200" y1="72" x2="200" y2="130" stroke-opacity="0.9"/>
    <!-- Bottom -->
    <line x1="200" y1="270" x2="200" y2="328" stroke-opacity="0.9"/>
    <!-- Left -->
    <line x1="72" y1="200" x2="130" y2="200" stroke-opacity="0.9"/>
    <!-- Right -->
    <line x1="270" y1="200" x2="328" y2="200" stroke-opacity="0.9"/>
  </g>

  <!-- Middle ring -->
  <circle cx="200" cy="200" r="95" fill="none" stroke="#ffe066" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Naaru-inspired geometric body — octagram star -->
  <g transform="translate(200,200)" filter="url(#glow-gold)">
    <!-- Outer star points (8-pointed, two overlapping squares) -->
    <polygon points="0,-72 17,-17 72,0 17,17 0,72 -17,17 -72,0 -17,-17"
             fill="none" stroke="#ffe599" stroke-width="1.5" stroke-opacity="0.55"/>
    <polygon points="0,-72 17,-17 72,0 17,17 0,72 -17,17 -72,0 -17,-17"
             fill="#ffe066" fill-opacity="0.04"/>

    <!-- Rotated square -->
    <polygon points="51,-51 51,51 -51,51 -51,-51"
             fill="none" stroke="#c8860a" stroke-width="1" stroke-opacity="0.35"
             transform="rotate(45)"/>

    <!-- Inner diamond -->
    <polygon points="0,-38 38,0 0,38 -38,0"
             fill="none" stroke="#ffe066" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <!-- Naaru core glow -->
  <circle cx="200" cy="200" r="28" fill="url(#coreGrad)" filter="url(#blur-sm)"/>
  <circle cx="200" cy="200" r="14" fill="#fff8e0" filter="url(#blur-sm)"/>
  <circle cx="200" cy="200" r="7" fill="#ffffff"/>

  <!-- Targeting corner brackets -->
  <g stroke="#ffe066" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-opacity="0.85" filter="url(#glow-gold)">
    <!-- Top-left -->
    <path d="M140,155 L140,140 L155,140"/>
    <!-- Top-right -->
    <path d="M260,155 L260,140 L245,140"/>
    <!-- Bottom-left -->
    <path d="M140,245 L140,260 L155,260"/>
    <!-- Bottom-right -->
    <path d="M260,245 L260,260 L245,260"/>
  </g>

  <!-- Skull marker icon (top-right raid marker style) -->
  <g transform="translate(288, 112)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="22" fill="#ff2200" fill-opacity="0.2" filter="url(#blur-md)"/>
    <!-- Circle background -->
    <circle cx="0" cy="0" r="18" fill="#1a0000" stroke="#ff4422" stroke-width="1.5"/>
    <!-- Skull simplified -->
    <ellipse cx="0" cy="-2" rx="9" ry="8" fill="#ff5533"/>
    <rect x="-9" y="4" width="18" height="6" rx="2" fill="#ff5533"/>
    <!-- Eye sockets -->
    <ellipse cx="-3.5" cy="-3" rx="2.5" ry="2.5" fill="#1a0000"/>
    <ellipse cx="3.5" cy="-3" rx="2.5" ry="2.5" fill="#1a0000"/>
    <!-- Teeth -->
    <rect x="-6" y="5.5" width="3" height="4" rx="0.5" fill="#1a0000"/>
    <rect x="-1.5" y="5.5" width="3" height="4" rx="0.5" fill="#1a0000"/>
    <rect x="3" y="5.5" width="3" height="4" rx="0.5" fill="#1a0000"/>
  </g>

  <!-- Subtle arcane runes on the ring (dashes) -->
  <circle cx="200" cy="200" r="125" fill="none"
          stroke="#8855cc" stroke-width="1" stroke-opacity="0.3"
          stroke-dasharray="4 14"
          transform="rotate(22.5, 200, 200)"/>

  <!-- Addon name text -->
  <text x="200" y="358" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" font-weight="bold" letter-spacing="3"
        fill="#ffe066" fill-opacity="0.85"
        filter="url(#glow-gold)">DIVINE GUILE MARKER</text>

  <!-- Subtle vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#vignette)" rx="18"/>
</svg>
